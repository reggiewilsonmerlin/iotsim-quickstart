<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#00D4FF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IOTSIM Quick Start">
<meta name="description" content="IOTSIM Quick Start Guide — get up and running with the Infinite Outcome Trade Simulator in minutes">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon192.png">
<link rel="icon" href="./icon192.png">
<title>IOTSIM Quick Start Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/theme.css">
</head>
<body>
<div id="app">
<aside id="sidebar">
  <div class="hdr">
    <h1>IOTSIM</h1>
    <div class="sub">QUICK START GUIDE</div>
  </div>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="Search the guide…" autocomplete="off" spellcheck="false">
    <button class="search-clear" id="sx" onclick="clearSearch()" title="Clear">✕</button>
  </div>
  <div id="nav"></div>
  <div class="ft">© Reggie_W 2026+</div>
</aside>

<button id="mt" onclick="toggleMobileNav()">☰</button>
<div id="mo" onclick="if(event.target.id==='mo')closeMobileNav()"></div>

<main id="ct"><div id="ct-inner"></div></main>
</div>

<div id="ib">
  <span style="color:var(--text);font-size:13px;margin-right:8px">📲 Install for offline access</span>
  <button onclick="doInstall()" style="background:var(--accent);color:#000;border:none;padding:9px 22px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer">Install</button>
  <button onclick="document.getElementById('ib').classList.remove('show')" style="background:transparent;border:none;color:var(--dim);cursor:pointer;font-size:12px;margin-left:10px">Not now</button>
</div>

<script src="./assets/interactions.js"></script>
<script>
// ─── Navigation tree ────────────────────────────────────────────
const NAV = [
  {kind:"part",title:"Get Started",items:[
    {id:"cover",label:"Cover"},
    {id:"welcome",label:"1. Welcome"},
    {id:"first-load",label:"2. First Load"},
  ]},
  {kind:"part",title:"Reading the Chart",items:[
    {id:"emoji-key",label:"3. Emoji Key"},
    {id:"trade-label",label:"4. The Trade Label"},
  ]},
  {kind:"part",title:"Setting It Up",items:[
    {id:"settings-glance",label:"5. Settings at a Glance"},
    {id:"account-risk",label:"6. Account & Risk"},
    {id:"presets",label:"7. Asset Presets"},
  ]},
  {kind:"part",title:"The Insight Monitor",items:[
    {id:"monitor",label:"8. Monitor Pages"},
    {id:"stat-rows",label:"9. Stat Rows"},
  ]},
  {kind:"part",title:"Daily Workflow",items:[
    {id:"quick-switches",label:"10. Quick Switches"},
    {id:"next-steps",label:"11. Next Steps"},
  ]},
];

const FLAT_ORDER = [];
const LABEL_BY_ID = {};
(function flatten(nav){
  for(const p of nav) for(const it of (p.items||[])){
    if(it.items) flatten([it]);
    else if(it.id){ FLAT_ORDER.push(it.id); LABEL_BY_ID[it.id] = it.label; }
  }
})(NAV);

let DATA = null;
let CURRENT_ID = null;
const OPEN_GROUPS = new Set();

function buildNav(target){
  target = target || document.getElementById("nav");
  target.innerHTML = "";
  for(const part of NAV){
    const hdr = document.createElement("div");
    hdr.className = "nav-part"; hdr.textContent = part.title;
    target.appendChild(hdr);
    for(const item of part.items){
      if(item.items){
        const g = document.createElement("div");
        g.className = "nav-group" + (OPEN_GROUPS.has(item.label) ? " open" : "");
        const head = document.createElement("div");
        head.className = "nav-group-head";
        head.innerHTML = `<span class="chev">▶</span><span class="nm">${item.label}</span>`;
        head.onclick = () => {
          if(OPEN_GROUPS.has(item.label)) OPEN_GROUPS.delete(item.label);
          else OPEN_GROUPS.add(item.label);
          buildNav();
        };
        const body = document.createElement("div");
        body.className = "nav-group-body";
        for(const sub of item.items){
          const a = document.createElement("a");
          a.className = "nav-item" + (sub.id === CURRENT_ID ? " on" : "");
          a.textContent = sub.label;
          a.onclick = () => go(sub.id);
          body.appendChild(a);
        }
        g.appendChild(head); g.appendChild(body);
        target.appendChild(g);
      } else {
        const a = document.createElement("a");
        a.className = "nav-single" + (item.id === CURRENT_ID ? " on" : "");
        a.textContent = item.label;
        a.onclick = () => go(item.id);
        target.appendChild(a);
      }
    }
  }
}
window.buildNav = buildNav;

function openParentOf(id){
  for(const p of NAV) for(const item of p.items)
    if(item.items && item.items.some(x => x.id === id))
      OPEN_GROUPS.add(item.label);
}

function toggleMobileNav(){
  const mo = document.getElementById("mo");
  if(mo.classList.contains("show")){ mo.classList.remove("show"); return; }
  const sb = document.createElement("aside");
  sb.id = "sidebar";
  sb.innerHTML = `<div class="hdr"><h1>IOTSIM</h1><div class="sub">QUICK START GUIDE</div></div><div id="nav-m"></div>`;
  mo.innerHTML = ""; mo.appendChild(sb);
  buildNav(sb.querySelector("#nav-m"));
  mo.classList.add("show");
}
function closeMobileNav(){ document.getElementById("mo").classList.remove("show"); }

function renderCover(){
  return `
    <div class="cover">
      <div class="cover-logo"><img src="./IOTSIM_LOGO.png" alt="IOTSIM"></div>
      <div class="cover-title">QUICK START GUIDE</div>
      <div class="cover-sub">Infinite Outcome Trade Simulator &amp; Insight Monitor</div>
      <a class="cover-cta" onclick="go('welcome')">Begin →</a>
      <div class="cover-copy">
        <b>Get up and running in minutes.</b><br>
        This guide walks you through the essentials — installation, the trade label, the Insight Monitor, and the settings that matter most on day one.<br><br>
        © Reggie_W 2026+ — All rights reserved.
      </div>
    </div>`;
}

function go(id, anchor){
  if(id === "cover"){
    CURRENT_ID = id;
    buildNav();
    document.getElementById("ct-inner").innerHTML = renderCover();
    document.getElementById("ct").scrollTop = 0;
    history.replaceState(null, "", "#cover");
    closeMobileNav();
    return;
  }
  if(!DATA || !DATA[id]){
    document.getElementById("ct-inner").innerHTML = `<div style="padding:40px 0;color:var(--dim);font-style:italic">Chapter "${id}" not found in content.</div>`;
    return;
  }
  CURRENT_ID = id;
  openParentOf(id);
  buildNav();
  document.getElementById("ct-inner").innerHTML = DATA[id];
  const idx = FLAT_ORDER.indexOf(id);
  if(idx >= 0){
    const prev = idx > 0 ? FLAT_ORDER[idx - 1] : null;
    const next = idx < FLAT_ORDER.length - 1 ? FLAT_ORDER[idx + 1] : null;
    const nb = document.createElement("div"); nb.className = "nb";
    const pLbl = prev ? (LABEL_BY_ID[prev] || prev) : "";
    const nLbl = next ? (LABEL_BY_ID[next] || next) : "";
    nb.innerHTML = `${prev ? `<a class="bn" onclick="go('${prev}')">← ${pLbl}</a>` : `<span></span>`}${next ? `<a class="bn nx" onclick="go('${next}')">${nLbl} →</a>` : `<span></span>`}`;
    document.getElementById("ct-inner").appendChild(nb);
  }
  document.getElementById("ct").scrollTop = 0;
  history.replaceState(null, "", "#" + id);
  closeMobileNav();
  document.getElementById("ct-inner").querySelectorAll("script").forEach(s => {
    const ns = document.createElement("script");
    if(s.src) ns.src = s.src;
    else ns.textContent = s.textContent;
    s.parentNode.replaceChild(ns, s);
  });
}
window.go = go;

// ─── Search ──────────────────────────────────────────────
function runSearch(q){
  if(!DATA) return;
  q = (q||"").trim().toLowerCase();
  const navEl = document.getElementById("nav");
  const sx = document.getElementById("sx");
  if(!q){
    window.SEARCH_MODE = false;
    sx.classList.remove("show");
    buildNav();
    return;
  }
  window.SEARCH_MODE = true;
  sx.classList.add("show");

  const tmpEl = document.createElement("div");
  const hits = [];
  for(const id of Object.keys(DATA)){
    tmpEl.innerHTML = DATA[id];
    const text = tmpEl.textContent || "";
    const idx = text.toLowerCase().indexOf(q);
    if(idx >= 0){
      const start = Math.max(0, idx - 40);
      const end = Math.min(text.length, idx + q.length + 80);
      let snippet = text.slice(start, end);
      if(start > 0) snippet = "…" + snippet;
      if(end < text.length) snippet = snippet + "…";
      hits.push({id, title: LABEL_BY_ID[id] || id, snippet});
    }
  }

  navEl.innerHTML = "";
  if(hits.length === 0){
    const e = document.createElement("div");
    e.className = "search-empty";
    e.innerHTML = `No results for <b>"${escapeHtml(q)}"</b>`;
    navEl.appendChild(e);
    return;
  }
  const cnt = document.createElement("div");
  cnt.className = "search-count";
  cnt.textContent = `${hits.length} match${hits.length === 1 ? "" : "es"}`;
  navEl.appendChild(cnt);

  const wrap = document.createElement("div");
  wrap.className = "search-results";
  const re = new RegExp(escapeRegex(q), "ig");
  for(const h of hits.slice(0, 50)){
    const r = document.createElement("div");
    r.className = "search-result";
    const safe = escapeHtml(h.snippet).replace(re, m => `<mark>${m}</mark>`);
    r.innerHTML = `<div class="title">${escapeHtml(h.title)}</div><div class="ctx">${safe}</div>`;
    r.onclick = () => go(h.id);
    wrap.appendChild(r);
  }
  navEl.appendChild(wrap);
}

let deferredPrompt = null;
window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferredPrompt = e; document.getElementById("ib").classList.add("show"); });
function doInstall(){ if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt = null; document.getElementById("ib").classList.remove("show"); }}
window.doInstall = doInstall;

// ─── Init ───────────────────────────────────────────────
(async function init(){
  if("serviceWorker" in navigator){
    try{ await navigator.serviceWorker.register("./sw.js"); }catch(e){}
  }
  try{
    const res = await fetch("./content.json");
    const json = await res.json();
    DATA = json;
  } catch(e){
    document.getElementById("ct-inner").innerHTML = `<div style="padding:40px 0;color:var(--red)">Failed to load content.</div>`;
    return;
  }
  buildNav();
  const searchInput = document.getElementById("search");
  searchInput.addEventListener("input", e => runSearchDebounced(e.target.value));
  searchInput.addEventListener("keydown", e => { if(e.key === "Escape"){ clearSearch(); searchInput.blur(); }});

  let initialId = "cover";
  if(location.hash){
    const h = location.hash.slice(1);
    if(h === "cover" || DATA[h]) initialId = h;
  }
  go(initialId);

  window.addEventListener("hashchange", () => {
    const h = location.hash.slice(1);
    if(h && (h === "cover" || DATA[h]) && h !== CURRENT_ID) go(h);
  });
})();

window.runSearch = runSearch;
</script>
</body>
</html>
